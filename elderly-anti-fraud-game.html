html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif}

.page{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .3s;z-index:1}
.page.active{opacity:1;pointer-events:auto;z-index:2}

.ic{text-align:center;max-width:380px;width:100%}
.ic .emoji{font-size:72px;margin-bottom:20px;animation:b 2s infinite}

.ic .sub{color:var(--warn);font-size:14px;margin-bottom:20px}

.rules h3{color:#fff;font-size:14px;margin-bottom:10px}
.rules ul{list-style:none}
.rules li{color:#bbb;font-size:13px;line-height:1.8;padding-left:20px;position:relative}
.rules li::before{content:'>';position:absolute;left:0;color:var(--g)}
.btn{background:var(--g);color:#fff;padding:14px 40px;border-radius:8px;border:none;font-size:17px;font-weight:500;cursor:pointer;width:100%}
.btn:active{background:var(--gd)}
.warn{color:#666;font-size:11px;margin-top:16px;line-height:1.5}
/* 场景选择页 */
#p2{background:var(--tbb);align-items:stretch;justify-content:flex-start;padding:0;overflow-y:auto}
.st{text-align:center;padding:20px 16px 12px;background:var(--tbb);position:sticky;top:0;z-index:5}
.st h1{color:var(--mt);font-size:20px;font-weight:600}
.st .d{color:var(--ms);font-size:12px;margin-top:6px}
.cards{display:flex;flex-direction:column;gap:0;width:100%;max-width:480px;margin:0;padding:0 0 30px}
.card{background:#fff;border-bottom:1px solid var(--line);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .15s}
.card:active{background:#ECECEC}
.card .av{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.ci{flex:1;text-align:left}
.ci .n{color:var(--mt);font-size:17px;font-weight:500}
.ci .t{color:var(--ms);font-size:13px;margin-top:2px}
.ci .df{margin-top:4px;font-size:11px;color:var(--o)}
.ci .ar{color:#C8C8C8;font-size:14px}
/* 游戏页 */
#p3{background:var(--bg)}
.gh{background:var(--tb);color:var(--mt);padding:0 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;height:44px;border-bottom:1px solid var(--line);position:relative}
.gh .back{font-size:24px;color:var(--g);cursor:pointer;padding:0 4px 0 0;font-weight:300;line-height:1}
.gh .av{width:32px;height:32px;border-radius:8px;font-size:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.gh .nm{flex:1;font-size:17px;font-weight:600;color:var(--mt);text-align:left}
.gh .nm .st2{font-size:11px;color:var(--ms);font-weight:400}
.gh .more{font-size:20px;color:var(--ms);padding:0 4px;cursor:pointer}

.sb{background:#fff;padding:10px 14px;display:flex;flex-direction:column;gap:8px;flex-shrink:0;border-bottom:1px solid var(--line)}
.sr{display:flex;align-items:center;gap:8px}
.si{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.sc{flex:1;display:flex;flex-direction:column;gap:2px}
.sh{display:flex;justify-content:space-between;align-items:center}
.sn{font-size:12px;color:var(--ms)}
.sv{font-size:14px;font-weight:600;color:var(--mt);transition:all .3s}
.sv.fu{animation:fu .6s ease}.sv.fd{animation:fd .6s ease}
@keyframes fu{0%{transform:scale(1)}30%{transform:scale(1.3);color:#07C160}100%{transform:scale(1)}}
@keyframes fd{0%{transform:scale(1)}30%{transform:scale(1.3);color:#FA5151}100%{transform:scale(1)}}
.stk{height:6px;border-radius:3px;background:#EBEBEB;overflow:hidden;position:relative}
.sf{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1);position:relative}
.sf.fr{background:#07C160}
.sf.fr.lo{background:#FA5151}
.wd{background:#fff;padding:8px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;border-bottom:1px solid var(--line)}
.wd .lb{font-size:12px;color:var(--ms)}
.wd .am{font-size:18px;font-weight:600;color:var(--mt);transition:all .3s}
.wd .am.up{color:var(--g);transform:scale(1.1)}.wd .am.dn{color:var(--r);transform:scale(1.1)}
.wd .ri{font-size:11px;color:var(--ms);background:#F0F0F0;padding:3px 8px;border-radius:4px}

.ca{flex:1;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch;background:var(--bg)}
.m{max-width:70%;padding:9px 13px;border-radius:4px;font-size:16px;line-height:1.5;word-break:break-word;animation:mi .2s ease;position:relative}
@keyframes mi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.m.bo{align-self:flex-start;background:#fff;border-radius:4px;position:relative}
.m.bo::before{content:'';position:absolute;left:-6px;top:12px;width:0;height:0;border:6px solid transparent;border-right-color:#fff;border-left:0}
.m.pl{align-self:flex-end;background:var(--cg);border-radius:4px;position:relative}
.m.pl::after{content:'';position:absolute;right:-6px;top:12px;width:0;height:0;border:6px solid transparent;border-left-color:var(--cg);border-right:0}
.m.sy{align-self:center;background:rgba(0,0,0,.08);color:var(--ms);font-size:12px;padding:3px 10px;border-radius:4px;max-width:85%;text-align:center}
.ma{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;align-self:flex-start;margin-top:0}
.ti{align-self:flex-start;background:#fff;border-radius:4px;padding:12px 16px;box-shadow:none;position:relative}
.ti::before{content:'';position:absolute;left:-6px;top:14px;width:0;height:0;border:6px solid transparent;border-right-color:#fff;border-left:0}
.ti span{width:6px;height:6px;border-radius:50%;background:#C8C8C0;animation:ty 1.2s infinite;display:inline-block;margin:0 1px}
.ti span:nth-child(2){animation-delay:.2s}.ti span:nth-child(3){animation-delay:.4s}
@keyframes ty{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
.chat-row{display:flex;gap:8px;align-items:flex-start}
.chat-row.me{justify-content:flex-end}
/* 选项区 */
.opts{background:var(--tbb);padding:8px 12px;display:flex;flex-direction:column;gap:6px;flex-shrink:0;border-top:1px solid var(--line);max-height:240px;overflow-y:auto}
.opt{background:#fff;border:none;border-radius:4px;padding:10px 14px;font-size:15px;color:var(--mt);cursor:pointer;text-align:left;transition:background .1s;line-height:1.4;font-family:inherit}
.opt:active{background:#ECECEC}
.opt:disabled{opacity:.4;cursor:default}
.opt.correct{background:#e8f8e8;border:1px solid var(--g);color:#07C160}
.opt.wrong{background:#ffe8e8;border:1px solid var(--r);color:#FA5151}
/* 反馈 */
.fb{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:10px 16px;border-radius:8px;font-size:14px;z-index:20;opacity:0;max-width:80%;text-align:center;line-height:1.5;pointer-events:none;transition:opacity .3s}
.fb.show{opacity:1}
/* 游戏结束弹窗 */
.go{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:30;opacity:0;pointer-events:none;transition:opacity .3s}
.go.show{opacity:1;pointer-events:auto}
.goc{background:#fff;border-radius:12px;padding:24px 20px;text-align:center;max-width:340px;width:88%;animation:gi .3s ease}
@keyframes gi{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.goc .gi{font-size:48px;margin-bottom:12px}
.goc .gt{font-size:18px;font-weight:600;color:var(--mt);margin-bottom:8px}
.goc .gd{font-size:13px;color:var(--ms);line-height:1.6;margin-bottom:16px}
.gos{background:#F7F7F7;border-radius:8px;padding:12px;margin-bottom:18px;text-align:left}
.gosi{display:flex;justify-content:space-between;padding:3px 0;font-size:13px}
.gosi .l{color:var(--ms)}.gosi .r{color:var(--mt);font-weight:500}
.tip-box{background:#FFF9E6;border:1px solid #FFE08A;border-radius:8px;padding:12px;margin-bottom:18px;text-align:left}
.tip-box .tip-title{font-size:13px;color:var(--warn);font-weight:600;margin-bottom:6px}
.tip-box .tip-text{font-size:12px;color:#666;line-height:1.6}
.vt{position:fixed;bottom:4px;right:8px;font-size:10px;color:#BBB;z-index:99;pointer-events:none}
</style>
</head>

// ===== 游戏状态 =====
var S={cid:null,round:0,wa:100,cr:0,lock:false,totalRound:10};

// ===== 工具函数 =====
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ===== 页面切换 =====
function showPage(id){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
  document.getElementById(id).classList.add('active');
}
function goSelect(){
  document.getElementById('go').classList.remove('show');
  renderCards();
  showPage('p2');
}
function renderCards(){
  document.getElementById('cards').innerHTML=SCENES.map(function(c){
    return '<div class="card" onclick="startGame(\''+c.id+'\')"><div class="av" style="background:'+c.bg+'">'+c.emoji+'</div><div class="ci"><div class="n">'+c.name+'</div><div class="t">'+c.tag+'</div><div class="df">危险等级：'+c.df+'</div></div><span class="ar">›</span></div>';
  }).join('');
}

// ===== 开始游戏 =====
function startGame(cid){
  var c=SCENES.find(function(x){return x.id===cid});
  S={cid:cid,round:0,wa:100,cr:0,lock:false,totalRound:10};
  document.getElementById('ghAv').textContent=c.emoji;
  document.getElementById('ghAv').style.background=c.bg;
  document.getElementById('ghNm').textContent=c.name;
  document.getElementById('ca').innerHTML='';
  showPage('p3');
  updateStats();
  setTimeout(function(){
    addSys('⚠️ 场景：「'+c.name+'」—— 请谨慎应对骗子的每一句话！');
    setTimeout(nextRound,800);
  },300);
}

// ===== 下一轮 =====
function nextRound(){
  if(S.round>=S.totalRound){
    endGame();
    return;
  }
  var rounds=ROUNDS[S.cid];
  var r=rounds[S.round];
  S.round++;
  S.lock=true;
  document.getElementById('ghSt').textContent='对方正在输入…';
  showTyping();
  setTimeout(function(){
    removeTyping();
    addBot(r.bot);
    renderOpts(r);
    S.lock=false;
    document.getElementById('ghSt').textContent='在线';
  },800+Math.random()*500);
}

// ===== 渲染选项 =====
function renderOpts(r){
  var c=document.getElementById('opts');
  c.innerHTML=r.opts.map(function(o,i){
    return '<button class="opt" onclick="chooseOpt('+i+')">'+o.text+'</button>';
  }).join('');
}

// ===== 选择选项 =====
function chooseOpt(idx){
  if(S.lock)return;
  var rounds=ROUNDS[S.cid];
  var r=rounds[S.round-1];
  var o=r.opts[idx];

  // 禁用所有选项
  var btns=document.querySelectorAll('.opt');
  btns.forEach(function(b){b.disabled=true});

  // 高亮正确/错误选项
  btns.forEach(function(b,i){
    var opt=r.opts[i];
    if(opt.c>0){b.classList.add('correct')}
    if(opt.m<0){b.classList.add('wrong')}
  });

  // 显示玩家选择
  addPlayer(o.text);

  // 应用效果
  S.wa=Math.max(0,S.wa+o.m);
  S.cr+=o.c;
  if(o.m!==0)animateWallet(o.m>0?'up':'dn');
  updateStats();

  // 显示反馈
  setTimeout(function(){showFb(o.fb)},400);

  // 检查游戏结束
  if(S.wa<=0){setTimeout(function(){endGame('lose','钱包空了！','你被骗子骗光了所有钱。记住：不轻信、不贪利、不转账！')},2000);return}

  // 显示骗子回复
  S.lock=true;
  document.getElementById('ghSt').textContent='对方正在输入…';
  showTyping();
  setTimeout(function(){
    removeTyping();
    addBot(o.reply);
    S.lock=false;
    document.getElementById('ghSt').textContent='在线';
    setTimeout(nextRound,2000);
  },1000);
}

// ===== UI函数 =====
function updateStats(){
  var pct=S.wa;
  document.getElementById('fv').textContent='¥'+S.wa;
  document.getElementById('fb').style.width=pct+'%';
  document.getElementById('fb').className='sf fr'+(pct<30?' lo':'');
  document.getElementById('sv2').textContent=S.cr+' / '+S.totalRound;
  document.getElementById('sb3').style.width=(S.cr/S.totalRound*100)+'%';
  document.getElementById('wa').textContent='¥'+S.wa;
  document.getElementById('ri').textContent='识破: '+S.cr+' / '+S.totalRound;
}
function animateWallet(dir){
  var el=document.getElementById('wa');
  el.classList.remove('up','dn');void el.offsetWidth;el.classList.add(dir);
  setTimeout(function(){el.classList.remove('up','dn')},600);
}
function addBot(text){
  var area=document.getElementById('ca');
  var c=SCENES.find(function(x){return x.id===S.cid});
  var row=document.createElement('div');
  row.className='chat-row';
  row.innerHTML='<div class="ma" style="background:'+c.bg+'">'+c.emoji+'</div><div class="m bo">'+esc(text)+'</div>';
  area.appendChild(row);area.scrollTop=area.scrollHeight;
}
function addPlayer(text){
  var area=document.getElementById('ca');
  var row=document.createElement('div');
  row.className='chat-row me';
  row.innerHTML='<div class="m pl">'+esc(text)+'</div>';
  area.appendChild(row);area.scrollTop=area.scrollHeight;
}
function addSys(text){
  var area=document.getElementById('ca');
  var d=document.createElement('div');d.className='m sy';d.textContent=text;
  area.appendChild(d);area.scrollTop=area.scrollHeight;
}
function showTyping(){
  var area=document.getElementById('ca');
  if(document.getElementById('tyInd'))return;
  var c=SCENES.find(function(x){return x.id===S.cid});
  var row=document.createElement('div');
  row.id='tyInd';row.className='chat-row';
  row.innerHTML='<div class="ma" style="background:'+c.bg+'">'+c.emoji+'</div><div class="ti"><span></span><span></span><span></span></div>';
  area.appendChild(row);area.scrollTop=area.scrollHeight;
}
function removeTyping(){var el=document.getElementById('tyInd');if(el)el.remove()}
function showFb(msg){
  if(!msg)return;
  var fb=document.getElementById('fb2');fb.textContent=msg;fb.classList.add('show');
  setTimeout(function(){fb.classList.remove('show')},3000);
}

// ===== 游戏结束 =====
function endGame(result,title,desc){
  var go=document.getElementById('go');
  var lost=100-S.wa;
  var c=SCENES.find(function(x){return x.id===S.cid});

  if(!result){
    // 正常结束
    if(S.wa>=100&&S.cr>=8){
      document.getElementById('goi').textContent='🏆';
      document.getElementById('got').textContent='完美防御！防骗达人！';
      document.getElementById('god').textContent='你成功识破了「'+c.name+'」的所有套路，一分钱没花！你是银发守护者！';
    }else if(S.wa>=80&&S.cr>=5){
      document.getElementById('goi').textContent='✅';
      document.getElementById('got').textContent='防御成功！';
      document.getElementById('god').textContent='你在「'+c.name+'」中保持了警惕，识破了'+S.cr+'次套路。做得不错！';
    }else if(S.wa>=50){
      document.getElementById('goi').textContent='⚠️';
      document.getElementById('got').textContent='部分失守';
      document.getElementById('god').textContent='你被骗了¥'+lost+'，识破了'+S.cr+'次。还需要提高警惕！';
    }else{
      document.getElementById('goi').textContent='💔';
      document.getElementById('got').textContent='损失严重';
      document.getElementById('god').textContent='你被骗了¥'+lost+'。记住：不轻信、不贪利、不转账！';
    }
  }else{
    document.getElementById('goi').textContent='💔';
    document.getElementById('got').textContent='游戏结束 — '+title;
    document.getElementById('god').textContent=desc;
  }

  var eff=S.round>0?Math.round(S.cr/S.round*100)+'%':'0%';
  var summary='';
  summary+='<div class="gosi"><span class="l">💬 对话轮数</span><span class="r">'+S.round+' / '+S.totalRound+'</span></div>';
  summary+='<div class="gosi"><span class="l">🔍 识破套路</span><span class="r">'+S.cr+' 次</span></div>';
  summary+='<div class="gosi"><span class="l">💸 被骗金额</span><span class="r" style="color:'+(lost>0?'#FA5151':'#07C160')+'">¥'+lost+'</span></div>';
  summary+='<div class="gosi"><span class="l">💰 剩余钱包</span><span class="r">¥'+S.wa+'</span></div>';
  summary+='<div class="gosi"><span class="l">📊 识破效率</span><span class="r">'+eff+'</span></div>';
  document.getElementById('gos').innerHTML=summary;
  document.getElementById('tipText').textContent=c.tip;
  go.classList.add('show');
}
function confirmBack(){
  if(S.round>0&&!document.getElementById('go').classList.contains('show')){
    if(!confirm('确定要退出当前游戏吗？进度将丢失。'))return;
  }
  goSelect();
}
